name: Deploy Sangjang Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # 매일 07:00 KST에 데이터 갱신 후 재배포합니다. cron은 UTC 기준입니다.
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Node/npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        env:
          NODE_ENV: development
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          set -euo pipefail
          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000
          # GitHub Actions/저장소 설정에서 production/omit=dev가 잡혀 있어도 빌드 도구(vite)가 설치되도록 방어합니다.
          unset NODE_ENV || true
          npm config delete production || true
          npm config delete omit || true

          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/; then
              npm ls --depth=0
              test -x ./node_modules/.bin/vite
              ./node_modules/.bin/vite --version
              echo "의존성 설치 완료"
              exit 0
            fi

            echo "npm ci 실패. npm 캐시와 node_modules를 정리한 뒤 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          echo "의존성 설치에 실패했습니다. package-lock.json과 npm 로그를 확인해주세요."
          exit 1

      - name: Generate OpenDART data
        run: |
          if [ -n "$DART_API_KEY" ]; then
            npm run update:data || echo "OpenDART 데이터 갱신 실패: 기존 public/data/ipos.json으로 빌드합니다."
          else
            echo "DART_API_KEY가 없어 빈 데이터 파일로 빌드합니다."
          fi
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LOOKBACK_DAYS: "180"
          LOOKAHEAD_DAYS: "120"

      - name: Generate IPO report
        run: npm run generate:report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORT_ENABLED: ${{ vars.GEMINI_REPORT_ENABLED || 'true' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}

      - name: Validate static data
        run: npm run validate:data

      - name: Build React app
        run: |
          ./node_modules/.bin/vite --version
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
