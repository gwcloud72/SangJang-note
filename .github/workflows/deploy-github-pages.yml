name: Deploy Sangjang Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Node/npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_ENV || true
          unset NPM_CONFIG_PRODUCTION || true
          unset NPM_CONFIG_OMIT || true

          if grep -qE 'localhost|file:|internal[.]api|applied[-]caas' package-lock.json; then
            echo "package-lock.json에 배포 환경에서 접근할 수 없는 registry/file 경로가 있습니다."
            exit 1
          fi

          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

          rm -rf node_modules
          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/; then
              break
            fi
            echo "npm ci 실패. 캐시 정리 후 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          test -x ./node_modules/.bin/vite
          ./node_modules/.bin/vite --version


      - name: Validate GitHub Actions env contract
        shell: bash
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LOOKBACK_DAYS: "180"
          LOOKAHEAD_DAYS: "120"
          DART_LIST_CHUNK_DAYS: ${{ vars.DART_LIST_CHUNK_DAYS }}
          DART_DOCUMENT_PAUSE_MS: ${{ vars.DART_DOCUMENT_PAUSE_MS }}
          NEWS_CLIENT_ID: ${{ secrets.NEWS_CLIENT_ID }}
          NEWS_CLIENT_SECRET: ${{ secrets.NEWS_CLIENT_SECRET }}
          NEWS_FETCH_ENABLED: ${{ vars.NEWS_FETCH_ENABLED }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FRED_FETCH_ENABLED: ${{ vars.FRED_FETCH_ENABLED }}
          FRED_MAX_OBSERVATIONS: ${{ vars.FRED_MAX_OBSERVATIONS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORTS_ENABLED: ${{ vars.GEMINI_REPORTS_ENABLED }}
          GEMINI_BRIEFINGS_ENABLED: ${{ vars.GEMINI_BRIEFINGS_ENABLED }}
          GEMINI_BRIEFINGS_MAX_CALLS: ${{ vars.GEMINI_BRIEFINGS_MAX_CALLS }}
          GEMINI_BRIEFINGS_INCLUDE_ALL: ${{ vars.GEMINI_BRIEFINGS_INCLUDE_ALL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
        run: npm run actions:check

      - name: Backup current data
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/data-backup"
          mkdir -p "$RUNNER_TEMP/data-backup"
          if [ -d public/data ]; then
            cp -R public/data "$RUNNER_TEMP/data-backup/data"
          fi

      - name: Generate OpenDART data
        shell: bash
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LOOKBACK_DAYS: "180"
          LOOKAHEAD_DAYS: "120"
        run: |
          set -euo pipefail

          check_ipo_data() {
            node --input-type=module <<'NODE'
          import { existsSync, readFileSync } from 'node:fs';
          const file = 'public/data/ipos.json';
          if (!existsSync(file)) {
            console.error('ipos.json이 확인 필요합니다. OpenDART 수집 성공 또는 기존 데이터가 필요합니다.');
            process.exit(1);
          }
          const payload = JSON.parse(readFileSync(file, 'utf8'));
          if (!Array.isArray(payload.items)) {
            console.error('ipos.json items 배열이 확인 필요합니다.');
            process.exit(1);
          }
          const referenceDate = String(payload.metadata?.referenceDate || '').slice(0, 10);
          if (!/^\d{4}-\d{2}-\d{2}$/.test(referenceDate)) {
            console.error('ipos.json metadata.referenceDate가 확인 필요합니다.');
            process.exit(1);
          }
          if (payload.items.length === 0) {
            console.warn('OpenDART 기준 표시 가능한 IPO 일정이 0건입니다. 빈 상태 화면으로 배포를 계속합니다.');
          } else {
            console.log(`OpenDART 데이터 확인: ${payload.items.length}개 일정`);
          }
          NODE
          }

          restore_data() {
            if [ -d "$RUNNER_TEMP/data-backup/data" ]; then
              rm -rf public/data
              mkdir -p public
              cp -R "$RUNNER_TEMP/data-backup/data" public/data
            fi
          }

          if [ -z "${DART_API_KEY:-}" ]; then
            echo "DART_API_KEY가 없어 데이터 수집을 건너뜁니다. 화면은 기본 표시 데이터로 배포됩니다."
            exit 0
          fi

          if npm run update:data; then
            check_ipo_data
          else
            echo "OpenDART 데이터 갱신 실패. 기존 데이터를 복구합니다."
            restore_data
            check_ipo_data
          fi

      - name: Sanitize derived IPO data
        shell: bash
        run: npm run sanitize:derived

      - name: Generate IPO news
        shell: bash
        env:
          NEWS_CLIENT_ID: ${{ secrets.NEWS_CLIENT_ID }}
          NEWS_CLIENT_SECRET: ${{ secrets.NEWS_CLIENT_SECRET }}
          NEWS_FETCH_ENABLED: ${{ vars.NEWS_FETCH_ENABLED }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_MAX_ITEMS: ${{ vars.NEWS_MAX_ITEMS }}
        run: |
          set -euo pipefail
          npm run update:news || echo "뉴스 갱신은 건너뛰고 기존 또는 확인 상태 데이터를 사용합니다."

      - name: Collect competition news mentions
        shell: bash
        env:
          NEWS_CLIENT_ID: ${{ secrets.NEWS_CLIENT_ID }}
          NEWS_CLIENT_SECRET: ${{ secrets.NEWS_CLIENT_SECRET }}
          COMPETITION_NEWS_ENABLED: ${{ vars.COMPETITION_NEWS_ENABLED }}
          COMPETITION_NEWS_DISPLAY: ${{ vars.COMPETITION_NEWS_DISPLAY }}
          COMPETITION_NEWS_MAX_ITEMS: ${{ vars.COMPETITION_NEWS_MAX_ITEMS }}
          COMPETITION_NEWS_PAUSE_MS: ${{ vars.COMPETITION_NEWS_PAUSE_MS }}
          COMPETITION_ALLOW_OUTSIDE_HOURS: "false"
          GEMINI_COMPETITION_ENABLED: ${{ vars.GEMINI_COMPETITION_ENABLED }}
          GEMINI_COMPETITION_MAX_CALLS: ${{ vars.GEMINI_COMPETITION_MAX_CALLS }}
          GEMINI_COMPETITION_MIN_REGEX_CONFIDENCE: ${{ vars.GEMINI_COMPETITION_MIN_REGEX_CONFIDENCE }}
          GEMINI_COMPETITION_ONLY_WHEN_REGEX: ${{ vars.GEMINI_COMPETITION_ONLY_WHEN_REGEX }}
          COMPETITION_GEMINI_PARSE_AMBIGUOUS: ${{ vars.COMPETITION_GEMINI_PARSE_AMBIGUOUS }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -euo pipefail
          npm run collect:competition-news || echo "경쟁률 뉴스 언급 갱신은 건너뛰고 기존 데이터를 사용합니다."

      - name: Generate IPO report
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORTS_ENABLED: ${{ vars.GEMINI_REPORTS_ENABLED }}
          GEMINI_BRIEFINGS_ENABLED: ${{ vars.GEMINI_BRIEFINGS_ENABLED }}
          GEMINI_BRIEFINGS_MAX_CALLS: ${{ vars.GEMINI_BRIEFINGS_MAX_CALLS }}
          GEMINI_BRIEFINGS_INCLUDE_ALL: ${{ vars.GEMINI_BRIEFINGS_INCLUDE_ALL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/report-backup"
          if [ -f public/data/ipo-ai-report.json ]; then
            cp public/data/ipo-ai-report.json "$RUNNER_TEMP/report-backup/ipo-ai-report.json"
          fi

          if npm run generate:report; then
            test -f public/data/ipo-ai-report.json
          else
            echo "IPO 리포트 생성 실패. 기존 리포트를 복구합니다."
            if [ -f "$RUNNER_TEMP/report-backup/ipo-ai-report.json" ]; then
              cp "$RUNNER_TEMP/report-backup/ipo-ai-report.json" public/data/ipo-ai-report.json
            else
              exit 1
            fi
          fi


      - name: Generate IPO briefings
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_BRIEFINGS_ENABLED: ${{ vars.GEMINI_BRIEFINGS_ENABLED }}
          GEMINI_BRIEFINGS_MAX_CALLS: ${{ vars.GEMINI_BRIEFINGS_MAX_CALLS }}
          GEMINI_BRIEFINGS_INCLUDE_ALL: ${{ vars.GEMINI_BRIEFINGS_INCLUDE_ALL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
        run: |
          set -euo pipefail
          npm run generate:briefings

      - name: Generate market environment data
        shell: bash
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FRED_FETCH_ENABLED: ${{ vars.FRED_FETCH_ENABLED }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORTS_ENABLED: ${{ vars.GEMINI_REPORTS_ENABLED }}
          GEMINI_BRIEFINGS_ENABLED: ${{ vars.GEMINI_BRIEFINGS_ENABLED }}
          GEMINI_BRIEFINGS_MAX_CALLS: ${{ vars.GEMINI_BRIEFINGS_MAX_CALLS }}
          GEMINI_BRIEFINGS_INCLUDE_ALL: ${{ vars.GEMINI_BRIEFINGS_INCLUDE_ALL }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_REQUEST_PAUSE_MS: ${{ vars.GEMINI_REQUEST_PAUSE_MS }}
          GEMINI_MAX_INPUT_CHARS: ${{ vars.GEMINI_MAX_INPUT_CHARS }}
          GEMINI_MAX_RETRIES: ${{ vars.GEMINI_MAX_RETRIES }}
        run: |
          set -euo pipefail
          case "${FRED_FETCH_ENABLED:-false}" in
            true|1|yes|on) ;;
            *)
              echo "시장환경 갱신을 건너뜁니다."
              exit 0
              ;;
          esac
          test -n "${FRED_API_KEY:-}" || { echo "FRED_API_KEY Secret이 필요합니다."; exit 1; }
          node scripts/fetchFredMacro.js

      - name: Run deployment checks
        run: npm run deploy:check

      - name: Commit refreshed data
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/data/ipos.json public/data/ipo-ai-report.json public/data/ipo-briefings.json public/data/ipo-briefings-gemini-cache.json public/data/news.json public/data/competition-mentions.json public/data/competition-gemini-cache.json public/data/competition-snapshots.json public/data/fred-macro.json public/data/fred-macro-report.json; then
            echo "반영할 데이터 변경을 확인했습니다."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/ipos.json public/data/ipo-ai-report.json public/data/ipo-briefings.json public/data/ipo-briefings-gemini-cache.json public/data/news.json public/data/competition-mentions.json public/data/competition-gemini-cache.json public/data/competition-snapshots.json public/data/fred-macro.json public/data/fred-macro-report.json
          git commit -m "상장노트 데이터 자동 갱신 [skip ci]"
          attempt=0
          until git push origin main; do
            attempt=$((attempt+1))
            if [ "$attempt" -ge 5 ]; then echo "push 5회 실패"; exit 1; fi
            echo "원격이 앞서감 — fetch·rebase 후 재시도 ($attempt/5)"
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; echo "rebase 충돌 — 중단"; exit 1; }
            sleep $((RANDOM % 4 + 2))
          done

      - name: Build React app
        env:
          VITE_DATA_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
