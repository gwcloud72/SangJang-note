name: Demo GitHub Actions Data

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sample-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --include=optional --no-audit --no-fund

      - name: Generate public V1 demo data
        run: npm run actions:sample

      - name: Run deployment checks
        run: npm run deploy:check

      - name: Commit demo data
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- public/data package.json; then
            echo "데모 데이터 변경 없음"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data package.json
            git commit -m "상장노트 GitHub Actions 데모 데이터 반영 [skip ci]"
            attempt=0
            until git push origin main; do
              attempt=$((attempt+1))
              if [ "$attempt" -ge 5 ]; then echo "push 5회 실패"; exit 1; fi
              echo "원격이 앞서감 — fetch·rebase 후 재시도 ($attempt/5)"
              git fetch origin main
              git rebase origin/main || { git rebase --abort || true; echo "rebase 충돌 — 중단"; exit 1; }
              sleep $((RANDOM % 4 + 2))
            done
          fi

      - name: Build React app
        env:
          VITE_DATA_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
