name: Deploy Sangjang Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Node/npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_ENV || true
          unset NPM_CONFIG_PRODUCTION || true
          unset NPM_CONFIG_OMIT || true

          if grep -qE 'applied-caas|internal\.api\.openai' package-lock.json; then
            echo "package-lock.json에 내부 registry 주소가 남아 있습니다. npm public registry 기준 lockfile로 갱신해야 합니다."
            exit 1
          fi

          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

          rm -rf node_modules
          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/; then
              break
            fi
            echo "npm ci 실패. 캐시 정리 후 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          if [ ! -x ./node_modules/.bin/vite ]; then
            echo "vite 실행 파일이 없어 devDependencies를 다시 설치합니다."
            npm install --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/
          fi

          test -x ./node_modules/.bin/vite
          ./node_modules/.bin/vite --version

      - name: Generate OpenDART data
        shell: bash
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LOOKBACK_DAYS: "180"
          LOOKAHEAD_DAYS: "120"
        run: |
          set -euo pipefail
          if [ -z "${DART_API_KEY:-}" ]; then
            echo "DART_API_KEY가 없어 OpenDART 데이터 갱신을 건너뜁니다. 기존 데이터 또는 empty state로 빌드합니다."
            exit 0
          fi
          npm run update:data || echo "::warning::OpenDART 데이터 갱신 실패. 기존 데이터 또는 empty state로 빌드합니다."

      - name: Generate IPO report
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORT_ENABLED: ${{ vars.GEMINI_REPORT_ENABLED }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          set -euo pipefail
          if [ "${GEMINI_REPORT_ENABLED:-true}" = "false" ]; then
            echo "GEMINI_REPORT_ENABLED=false 이므로 리포트 생성을 건너뜁니다."
            exit 0
          fi
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "GEMINI_API_KEY가 없어 리포트 생성을 건너뜁니다."
            exit 0
          fi
          npm run generate:report || echo "::warning::IPO 리포트 생성 실패. 기존 리포트 또는 empty state로 빌드합니다."

      - name: Validate static data
        run: npm run validate:data || echo "::warning::정적 데이터 검증 실패 또는 데이터 없음. empty state로 계속 빌드합니다."

      - name: Run QA checks
        run: npm run qa:check || echo "::warning::QA 검사 경고가 있습니다. 배포 빌드는 계속 진행합니다."

      - name: Build React app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
