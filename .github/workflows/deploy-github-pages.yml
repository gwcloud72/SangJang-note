name: Deploy Sangjang Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Node/npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_ENV || true
          unset NPM_CONFIG_PRODUCTION || true
          unset NPM_CONFIG_OMIT || true

          if grep -qE 'applied-caas|internal\.api\.openai|localhost|file:' package-lock.json; then
            echo "package-lock.json에 배포 환경에서 접근할 수 없는 registry/file 경로가 있습니다."
            exit 1
          fi

          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

          rm -rf node_modules
          for attempt in 1 2 3; do
            echo "npm ci 실행 시도 ${attempt}/3"
            if npm ci --include=dev --include=optional --no-audit --no-fund --prefer-online --registry=https://registry.npmjs.org/; then
              break
            fi
            echo "npm ci 실패. 캐시 정리 후 재시도합니다."
            npm cache clean --force || true
            rm -rf node_modules
            sleep 5
          done

          test -x ./node_modules/.bin/vite
          ./node_modules/.bin/vite --version

      - name: Backup current data
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/data-backup"
          mkdir -p "$RUNNER_TEMP/data-backup"
          if [ -d public/data ]; then
            cp -R public/data "$RUNNER_TEMP/data-backup/data"
          fi

      - name: Generate OpenDART data
        shell: bash
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LOOKBACK_DAYS: "180"
          LOOKAHEAD_DAYS: "120"
        run: |
          set -euo pipefail

          require_ipo_data() {
            node --input-type=module <<'NODE'
          import { existsSync, readFileSync } from 'node:fs';
          const file = 'public/data/ipos.json';
          if (!existsSync(file)) {
            console.error('ipos.json이 없습니다. OpenDART 수집 성공 또는 기존 데이터가 필요합니다.');
            process.exit(1);
          }
          const payload = JSON.parse(readFileSync(file, 'utf8'));
          if (!Array.isArray(payload.items) || payload.items.length === 0) {
            console.error('ipos.json에 IPO 데이터가 없습니다. 빈 데이터 배포를 중단합니다.');
            process.exit(1);
          }
          console.log(`OpenDART 데이터 확인: ${payload.items.length}개 일정`);
          NODE
          }

          restore_data() {
            if [ -d "$RUNNER_TEMP/data-backup/data" ]; then
              rm -rf public/data
              mkdir -p public
              cp -R "$RUNNER_TEMP/data-backup/data" public/data
            fi
          }

          if [ -z "${DART_API_KEY:-}" ]; then
            echo "DART_API_KEY가 없습니다. 기존 데이터 유효성을 확인합니다."
            require_ipo_data
            exit 0
          fi

          if npm run update:data; then
            require_ipo_data
          else
            echo "OpenDART 데이터 갱신 실패. 기존 데이터를 복구합니다."
            restore_data
            require_ipo_data
          fi

      - name: Generate IPO report
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REPORT_ENABLED: ${{ vars.GEMINI_REPORT_ENABLED }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/report-backup"
          if [ -f public/data/ipo-ai-report.json ]; then
            cp public/data/ipo-ai-report.json "$RUNNER_TEMP/report-backup/ipo-ai-report.json"
          fi

          if npm run generate:report; then
            test -f public/data/ipo-ai-report.json
          else
            echo "IPO 리포트 생성 실패. 기존 리포트를 복구합니다."
            if [ -f "$RUNNER_TEMP/report-backup/ipo-ai-report.json" ]; then
              cp "$RUNNER_TEMP/report-backup/ipo-ai-report.json" public/data/ipo-ai-report.json
            else
              exit 1
            fi
          fi

      - name: Validate static data
        run: npm run validate:data

      - name: Run QA checks
        run: npm run qa:check

      - name: Build React app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
