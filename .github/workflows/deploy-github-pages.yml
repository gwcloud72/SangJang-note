name: Deploy Sangjang Note

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate OpenDART data
        run: |
          if [ -n "$DART_API_KEY" ]; then
            npm run update:data || echo "OpenDART 갱신 실패, 기존 데이터로 계속 빌드합니다."
          else
            echo "DART_API_KEY가 없어 기존 데이터로 계속 빌드합니다."
          fi
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LOOKBACK_DAYS: "180"
          LOOKAHEAD_DAYS: "120"

      - name: Validate static data
        run: npm run validate:data

      - name: Build React app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4